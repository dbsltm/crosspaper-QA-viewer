<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Max2Facts Viewer</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#f5f6fa;color:#2d3436;padding:20px}
h1{text-align:center;margin-bottom:8px;font-size:1.6em}
.subtitle{text-align:center;color:#636e72;margin-bottom:20px;font-size:.95em}
.summary-bar{display:flex;gap:16px;justify-content:center;flex-wrap:wrap;margin-bottom:24px}
.summary-card{background:#fff;border-radius:8px;padding:12px 20px;box-shadow:0 1px 4px rgba(0,0,0,.08);text-align:center;min-width:120px}
.summary-card .val{font-size:1.5em;font-weight:700}
.summary-card .lbl{font-size:.8em;color:#636e72}
.filters{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin-bottom:20px}
.filters select,.filters input{padding:6px 10px;border:1px solid #ddd;border-radius:6px;font-size:.9em}
.q-card{background:#fff;border-radius:10px;margin-bottom:16px;box-shadow:0 2px 8px rgba(0,0,0,.06);overflow:hidden}
.q-header{padding:16px 20px;cursor:pointer;display:flex;justify-content:space-between;align-items:flex-start;gap:12px}
.q-header:hover{background:#f8f9fa}
.q-id{font-family:monospace;font-size:.8em;color:#636e72}
.q-text{font-weight:600;flex:1;line-height:1.4}
.q-badges{display:flex;gap:6px;flex-wrap:wrap;flex-shrink:0}
.badge{padding:2px 8px;border-radius:12px;font-size:.75em;font-weight:600}
.badge-diff{background:#ffeaa7;color:#856404}
.badge-type{background:#dfe6e9;color:#2d3436}
.badge-mod{background:#a29bfe;color:#fff}
.score-pills{display:flex;gap:4px;margin-top:6px}
.pill{padding:2px 7px;border-radius:10px;font-size:.72em;font-weight:600;color:#fff}
.q-body{display:none;padding:0 20px 20px}
.q-body.open{display:block}
.gold-answer{background:#f0fff4;border-left:3px solid #00b894;padding:10px 14px;margin:10px 0;border-radius:4px}
.gold-answer .label{font-weight:700;font-size:.85em;color:#00b894;margin-bottom:4px}
.hop-section{margin:14px 0}
.hop-title{font-weight:700;font-size:.95em;padding:8px 12px;background:#f8f9fa;border-radius:6px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center}
.hop-sub{font-style:italic;color:#555;margin:4px 0 8px 12px}
.hop-answer{margin:0 0 8px 12px;color:#2d3436}
.hop-answer .label{font-weight:600;font-size:.82em;color:#6c5ce7}
.fact{border:1px solid #eee;border-radius:6px;padding:10px 12px;margin:6px 0 6px 12px;font-size:.9em}
.fact-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px}
.fact-id{font-family:monospace;font-size:.78em;color:#999}
.fact-mod{font-size:.78em;font-weight:600;padding:1px 6px;border-radius:8px;display:inline-block}
.mod-text{background:#dfe6e9;color:#2d3436}
.mod-figure{background:#a29bfe;color:#fff}
.mod-table{background:#fd79a8;color:#fff}
.mod-equation{background:#fdcb6e;color:#2d3436}
.fact-content{line-height:1.45}
.fact-source{font-size:.78em;color:#999;margin-top:4px}
.eval-section{margin-top:12px}
.eval-section h4{font-size:.9em;margin-bottom:8px;color:#2d3436}
.eval-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:10px}
.eval-cell{background:#f8f9fa;border-radius:6px;padding:8px;text-align:center}
.eval-cell .cond{font-size:.72em;color:#636e72;margin-bottom:2px}
.eval-cell .score{font-size:1.2em;font-weight:700}
.toggle-details{font-size:.8em;color:#6c5ce7;cursor:pointer;margin-left:8px;text-decoration:underline}
.candidate-detail{display:none;margin:4px 0 8px 12px;padding:8px;background:#f8f9fa;border-radius:4px;font-size:.85em}
.candidate-detail.open{display:block}
.cond-block{margin-bottom:8px}
.cond-name{font-weight:600;color:#6c5ce7}
.cand-text{color:#555;margin:2px 0;white-space:pre-wrap;word-break:break-word}
.reasoning{color:#888;font-style:italic}
.chevron{transition:transform .2s;font-size:1.2em;color:#999}
.chevron.open{transform:rotate(90deg)}
</style>
</head>

ch is cost-effective", "This approach reliably distinguishes hallucinated objects from real objects in MLLM outputs"], "missing_claims": [], "token_f1": 0.625, "token_precision": 0.5263, "token_recall": 0.7692, "evaluator_model": "gpt-5.2-2025-12-11"}, "only_sections": {"candidate_answer": "EFUF curates positive and negative examples **automatically using CLIP text–image congruence scores**. It leverages the intuition that **real objects mentioned in the MLLM output should be semantically similar to the image**, while **hallucinated objects will have low similarity because they are not present in the image**. By thresholding/using these CLIP similarity scores, EFUF can **separate high-congruence (positive) examples from low-congruence (negative, hallucinated) examples** without manual annotation, making the process **cost-effective and reliable**.", "judge_score": 1.0, "judge_reasoning": "The candidate matches the gold answer’s key point: EFUF uses CLIP scores to curate positive/negative examples, yielding a cost-effective and reliable way to distinguish hallucinated from real objects. Added details (thresholding, congruence intuition) are consistent and do not contradict the gold.", "key_claims": ["EFUF uses CLIP model scores to curate positive and negative examples for unlearning", "This enables cost-effective identification (no expensive/manual labeling) of hallucinated vs real objects in MLLM outputs", "This enables reliable distinction between hallucinated and real objects in MLLM outputs"], "present_claims": ["EFUF uses CLIP model scores to curate positive and negative examples for unlearning", "This enables cost-effective identification (no expensive/manual labeling) of hallucinated vs real objects in MLLM outputs", "This enables reliable distinction between hallucinated and real objects in MLLM outputs"], "missing_claims": [], "token_f1": 0.3951, "token_precision": 0.2909, "token_recall": 0.6154, "evaluator_model": "gpt-5.2-2025-12-11"}, "parametric": {"candidate_answer": "EFUF curates unlearning data by **automatically labeling model-generated object mentions as “real” or “hallucinated” using cheap, reliable cross-checks against the input image**, then using those labels to form **positive (keep) and negative (forget) pairs**:\n\n- **Generate candidate objects**: Run the MLLM on an image with object-focused prompts to elicit a list of mentioned objects (nouns/phrases).\n- **Verify each mentioned object with an external visual signal** (cost-effective, no human labeling): use an off‑the‑shelf **open‑vocabulary detector/segmenter (e.g., GroundingDINO/GLIP + SAM)** or similar vision model to test whether the mentioned object can be grounded in the image (sufficient confidence/IoU/region evidence).\n- **Curate examples**:\n  - **Positive examples (retain/align)**: object mentions that are **grounded/verified** in the image → keep as correct supervision.\n  - **Negative examples (unlearn)**: object mentions that **cannot be grounded** (no detection/low confidence) → treat as hallucinations to be forgotten/suppressed.\n- **Reliability controls**: apply thresholds, synonym normalization, and filtering (e.g., discard ambiguous/low‑evidence cases) to reduce false labels while keeping the pipeline automatic and cheap.\n\nThis yields a scalable dataset where “hallucinated vs real” is distinguished by **grounding evidence** rather than manual annotation.", "judge_score": 0.3, "judge_reasoning": "The gold answer’s central mechanism is CLIP-score-based curation. The candidate instead describes using open-vocabulary detectors/segmenters (e.g., GroundingDINO/GLIP+SAM) and grounding evidence, which does not match the specified CLIP scoring approach. While it captures the general idea of automatic, cost-effective positive/negative curation for hallucination vs real-object distinction, it misses (and effectively replaces) the key CLIP-based method.", "key_claims": ["EFUF uses CLIP model scores to curate positive and negative examples for unlearning.", "This CLIP-score-based curation enables cost-effective and reliable identification/distinction of hallucinated objects versus real objects in MLLM outputs."], "present_claims": [], "missing_claims": ["EFUF uses CLIP model scores to curate positive and negative examples for unlearning.", "This CLIP-score-based curation enables cost-effective and reliable identification/distinction of hallucinated objects versus real objects in MLLM outputs."], "token_f1": 0.2278, "token_precision": 0.1364, "token_recall": 0.6923, "evaluator_model": "gpt-5.2-2025-12-11"}, "all_papers": {"candidate_answer": "EFUF curates positive and negative unlearning examples by using **fine-grained CLIP-based text–image congruence (image-relevance) scores** to automatically separate likely real objects from hallucinated ones, avoiding manual paired annotations.\n\n- **Step 1: Generate captions and extract object phrases.** For each image \\(v_i\\) and model-generated caption \\(t_i\\), EFUF extracts the set of mentioned objects \\(O_i=\\{o^i_j\\}\\).\n\n- **Step 2: Compute an object-level image-relevance score with CLIP.** Because an object may correspond to only part of the image, EFUF slides a window over image patches and takes the best match:\n  \\[\n  S(o^i_j)=\\max_{w\\in W_i}\\text{CLIP}(o^i_j, w)\n  \\]\n  This yields higher scores when the object phrase aligns with some image region, and lower scores when it does not (hallucination).\n\n- **Step 3: Threshold scores to form positive vs. negative subsentence datasets (no paired data needed).**\n  - **Positive examples** \\(D^+\\): subsentences containing objects with **high** relevance, \\(S(o)>T_0\\) (set to **32** in the paper).\n  - **Negative examples** \\(D^-\\): subsentences containing objects with **low** relevance, \\(S(o)<T_1\\) (set to **23**).\n  Each example uses the image \\(v_i\\), the prefix text \\(pre(o)\\), and the subsentence \\(cur(o)\\) containing the object; text after \\(cur(o)\\) is truncated.\n\n- **Why this is reliable and cost-effective:** A preliminary experiment shows hallucinated vs. non-hallucinated objects have **significantly different CLIP score distributions** (Table 1, Figure 2), enabling robust automatic separation via thresholds, thus eliminating expensive human annotation of paired hallucinated/non-hallucinated responses.", "judge_score": 1.0, "judge_reasoning": "The candidate explicitly states EFUF uses CLIP-based text–image congruence scores to separate likely real objects from hallucinated ones and uses these to form positive/negative unlearning datasets, emphasizing that this avoids manual annotation and is reliable due to separable score distributions. This matches the gold answer’s key claims.", "key_claims": ["EFUF uses CLIP model scores to curate/select positive and negative examples for unlearning.", "Using CLIP scores enables cost-effective and reliable identification/distinction of hallucinated objects versus real objects in MLLM outputs."], "present_claims": ["EFUF uses CLIP model scores to curate/select positive and negative examples for unlearning.", "Using CLIP scores enables cost-effective and reliable identification/distinction of hallucinated objects versus real objects in MLLM outputs."], "missing_claims": [], "token_f1": 0.2485, "token_precision": 0.1469, "token_recall": 0.8077, "evaluator_model": "gpt-5.2-2025-12-11"}}, {"fact_id": "F_f74f1b40a62d", "paper_id": "699320ac51ec", "modality": "text", "fact_content": "The EFUF approach, by integrating a fine-grained unlearning strategy, enables the model to avoid generating hallucinated objects in multimodal outputs, outperforming both the baseline MiniGPT4 and sentence-loss-only methods in a case study.", "has_image": false, "query": "In a case study comparing MiniGPT4, a sentence-loss-only unlearning method, and EFUF, which approach best prevents hallucinated objects in multimodal outputs, and what key strategy enables this improvement?", "gold_answer": "The EFUF approach, by inte e unlearning hallucinated parts.\n\nThese three automatically constructed datasets enable **fine-grained unlearning** of incorrect multimodal alignments without manual annotation.", "judge_score": 1.0, "judge_reasoning": "The candidate matches all key elements of the gold answer: it describes automatic creation of positive/negative subsentence and complete-sentence datasets by extracting object phrases from generated captions and using CLIP-based image relevance to label them, enabling fine-grained unlearning without manual annotation.", "key_claims": ["EFUF constructs three datasets: positive subsentence, negative subsentence, and complete sentence.", "These datasets are built by extracting objects from generated captions.", "EFUF computes image relevance for the extracted objects using CLIP.", "This automatic construction enables fine-grained unlearning of multimodal hallucinations without manual annotation."], "present_claims": ["EFUF constructs three datasets: positive subsentence, negative subsentence, and complete sentence.", "These datasets are built by extracting objects from generated captions.", "EFUF computes image relevance for the extracted objects using CLIP.", "This automatic construction enables fine-grained unlearning of multimodal hallucinations without manual annotation."], "missing_claims": [], "token_f1": 0.4211, "token_precision": 0.2828, "token_recall": 0.8235, "evaluator_model": "gpt-5.2-2025-12-11"}, "parametric": {"candidate_answer": "EFUF creates its training data by **automatically mining hallucination cases from a pretrained multimodal model’s own outputs**: it runs the model on image–text inputs, **detects fine-grained mismatches between generated claims and the visual evidence** (using self-consistency/verification signals rather than humans), and then **forms paired examples** where the hallucinated spans are labeled as “to forget” while the grounded parts are kept as “to retain.” These automatically constructed forget/retain pairs are then used to train the unlearning procedure **without manual annotation**.", "judge_score": 0.5, "judge_reasoning": "The candidate captures the general idea of automatically creating forget/retain training pairs without manual annotation for fine-grained unlearning. However, it omits the gold answer’s key mechanism: constructing three specific datasets (positive subsentence, negative subsentence, complete sentence) by extracting objects from captions and scoring their image relevance with CLIP. It also introduces an alternative mechanism (self-consistency/verification signals) that conflicts with the CLIP-based relevance calculation described in the gold.", "key_claims": ["EFUF constructs three datasets: positive subsentence, negative subsentence, and complete sentence", "These datasets are built by extracting objects from generated captions", "EFUF calculates image relevance of extracted objects using CLIP", "This automatic construction enables fine-grained unlearning of multimodal hallucinations without manual annotation"], "present_claims": ["This automatic construction enables fine-grained unlearning of multimodal hallucinations without manual annotation"], "missing_claims": ["EFUF constructs three datasets: positive subsentence, negative subsentence, and complete sentence", "These datasets are built by extracting objects from generated captions", "EFUF calculates image relevance of extracted objects using CLIP"], "token_f1": 0.2885, "token_precision": 0.2143, "token_recall": 0.4412, "evaluator_model": "gpt-5.2-2025-12-11"}, "all_papers": {"candidate_answer": "EFUF constructs its unlearning training data automatically by using **CLIP-based text–image relevance scores** to separate *likely real* vs *likely hallucinated* object mentions in model-generated captions, avoiding any human labeling.\n\nConcretely:\n\n1. **Generate captions**: Prompt the target MLLM to produce a caption/response \\(t_i\\) for each image \\(v_i\\).\n\n2. **Extract object phrases**: Use         hh+='<div style="display:flex;gap:4px;margin-top:4px">'+ap+'</div></div>';

      hh+='</div>';
      bp.push(hh);
    });
    card.innerHTML=hdr+'<div class="q-body" id="body'+qi+'">'+bp.join("")+'</div>';
    c.appendChild(card);
  });
}
