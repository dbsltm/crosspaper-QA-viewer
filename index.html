<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Max2Facts Viewer</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#f5f6fa;color:#2d3436;padding:20px}
h1{text-align:center;margin-bottom:8px;font-size:1.6em}
.subtitle{text-align:center;color:#636e72;margin-bottom:20px;font-size:.95em}
.summary-bar{display:flex;gap:16px;justify-content:center;flex-wrap:wrap;margin-bottom:24px}
.summary-card{background:#fff;border-radius:8px;padding:12px 20px;box-shadow:0 1px 4px rgba(0,0,0,.08);text-align:center;min-width:120px}
.summary-card .val{font-size:1.5em;font-weight:700}
.summary-card .lbl{font-size:.8em;color:#636e72}
.filters{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin-bottom:20px}
.filters select,.filters input{padding:6px 10px;border:1px solid #ddd;border-radius:6px;font-size:.9em}
.q-card{background:#fff;border-radius:10px;margin-bottom:16px;box-shadow:0 2px 8px rgba(0,0,0,.06);overflow:hidden}
.q-header{padding:16px 20px;cursor:pointer;display:flex;justify-content:space-between;align-items:flex-start;gap:12px}
.q-header:hover{background:#f8f9fa}
.q-id{font-family:monospace;font-size:.8em;color:#636e72}
.q-text{font-weight:600;flex:1;line-height:1.4}
.q-badges{display:flex;gap:6px;flex-wrap:wrap;flex-shrink:0}
.badge{padding:2px 8px;border-radius:12px;font-size:.75em;font-weight:600}
.badge-diff{background:#ffeaa7;color:#856404}
.badge-type{background:#dfe6e9;color:#2d3436}
.badge-mod{background:#a29bfe;color:#fff}
.score-pills{display:flex;gap:4px;margin-top:6px}
.pill{padding:2px 7px;border-radius:10px;font-size:.72em;font-weight:600;color:#fff}
.q-body{display:none;padding:0 20px 20px}
.q-body.open{display:block}
.gold-answer{background:#f0fff4;border-left:3px solid #00b894;padding:10px 14px;margin:10px 0;border-radius:4px}
.gold-answer .label{font-weight:700;font-size:.85em;color:#00b894;margin-bottom:4px}
.hop-section{margin:14px 0}
.hop-title{font-weight:700;font-size:.95em;padding:8px 12px;background:#f8f9fa;border-radius:6px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center}
.hop-sub{font-style:italic;color:#555;margin:4px 0 8px 12px}
.hop-answer{margin:0 0 8px 12px;color:#2d3436}
.hop-answer .label{font-weight:600;font-size:.82em;color:#6c5ce7}
.fact{border:1px solid #eee;border-radius:6px;padding:10px 12px;margin:6px 0 6px 12px;font-size:.9em}
.fact-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px}
.fact-id{font-family:monospace;font-size:.78em;color:#999}
.fact-mod{font-size:.78em;font-weight:600;padding:1px 6px;border-radius:8px;display:inline-block}
.mod-text{background:#dfe6e9;color:#2d3436}
.mod-figure{background:#a29bfe;color:#fff}
.mod-table{background:#fd79a8;color:#fff}
.mod-equation{background:#fdcb6e;color:#2d3436}
.fact-content{line-height:1.45}
.fact-img{max-width:200px;max-height:140px;border-radius:4px;margin-top:6px;cursor:pointer;border:1px solid #ddd;display:block}
.fact-source{font-size:.78em;color:#999;margin-top:4px}
.img-modal{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.85);display:flex;align-items:center;justify-content:center;z-index:1000;cursor:pointer}
.img-modal img{max-width:90%;max-height:90%;border-radius:8px}
.eval-section{margin-top:12px}
.eval-section h4{font-size:.9em;margin-bottom:8px;color:#2d3436}
.eval-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:10px}
.eval-cell{background:#f8f9fa;border-radius:6px;padding:8px;text-align:center}
.eval-cell .cond{font-size:.72em;color:#636e72;margin-bottom:2px}
.eval-cell .score{font-size:1.2em;font-weight:700}
.toggle-details{font-size:.8em;color:#6c5ce7;cursor:pointer;margin-left:8px;text-decoration:underline}
.candidate-detail{display:none;margin:4px 0 8px 12px;padding:8px;background:#f8f9fa;border-radius:4px;font-size:.85em}
.candidate-detail.open{display:block}
.cond-block{margin-bottom:8px}
.cond-name{font-weight:600;color:#6c5ce7}
.cand-text{color:#555;margin:2px 0;white-space:pre-wrap;word-break:break-word}
.reasoning{color:#888;font-style:italic}
.chevron{transition:transform .2s;font-size:1.2em;color:#999}
.chevron.open{transform:rotate(90deg)}
</style>
</head>

      (hop.facts||[]).forEach(function(fact){
        var mc={text:"mod-text",figure:"mod-figure",table:"mod-table",equation:"mod-equation"}[fact.modality]||"mod-text";
        var ae=(ev.atomic_facts||[]).find(function(af){return af.fact_id===fact.fact_id})||{};
        var ap=CONDS.map(function(cc){return pill(cc,(ae[cc]||{}).judge_score)}).join("");
        hh+='<div class="fact"><div class="fact-header"><span><span class="fact-mod '+mc+'">'+esc(fact.modality)+'</span> <span class="fact-id">'+esc(fact.fact_id)+'</span></span><span style="font-size:.78em;color:#999">'+esc((fact.paper_id||"").substring(0,8))+'&hellip; &middot; '+esc(fact.source_section||"")+'</span></div>';
        hh+='<div class="fact-content">'+esc(fact.content||fact.statement||"")+'</div>';
        if(fact.image_path)hh+='<img class="fact-img" src="/image?path='+encodeURIComponent(fact.image_path)+'" loading="lazy" onclick="showImgModal(this.src)">';
        if(ae.query)hh+='<div class="fact-source" style="margin-top:6px"><b>Auto QA:</b> '+esc(ae.query)+'</div>';
        if(ae.gold_answer)hh+='<div class="fact-source"><b>Gold:</b> '+esc(ae.gold_answer)+'</div>';
        hh+='<div style="display:flex;gap:4px;margin-top:4px">'+ap+'</div></div>';
      });
      hh+='</div>';
      bp.push(hh);
    });
    card.innerHTML=hdr+'<div class="q-body" id="body'+qi+'">'+bp.join("")+'</div>';
    c.appendChild(card);
  });
}

function toggleQ(i){document.getElementById("body"+i).classList.toggle("open");document.getElementById("chev"+i).classList.toggle("open")}
function toggleDetail(id){document.getElementById(id).classList.toggle("open")}
function showImgModal(src){var m=document.createElement("div");m.className="img-modal";m.innerHTML='<img src="'+src+'">';m.onclick=function(){m.remove()};document.body.appendChild(m)}

renderSummary();populateFilters();renderQuestions();
document.getElementById("filterDiff").addEventListener("change",renderQuestions);
document.getElementById("filterMod").addEventListener("change",renderQuestions);
document.getElementById("filterType").addEventListener("change",renderQuestions);
document.getElementById("searchBox").addEventListener("input",renderQuestions);
</script>
